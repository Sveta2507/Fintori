<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintori — Payment</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
  body { font-family: 'Inter', sans-serif; background: var(--bg,#f5f7fb); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: var(--surface,#fff); border: 1px solid var(--border,#e2e6ef); border-radius: 16px; padding: 48px 40px; max-width: 420px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
  .icon { font-size: 40px; margin-bottom: 16px; color: #2563eb; }
  h2 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
  p  { font-size: 14px; color: var(--g600,#4b5563); line-height: 1.6; margin-bottom: 24px; }
  a  { display: inline-block; padding: 12px 28px; background: linear-gradient(135deg,#2563eb,#7c3aed); color: #fff; border-radius: 10px; font-weight: 700; text-decoration: none; font-size: 14px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="fas fa-credit-card"></i></div>
  <h2>Payment Coming Soon</h2>
  <p>Secure payment processing via Stripe will be available here shortly. We'll notify you by email as soon as Pro subscriptions go live.</p>
  <a href="app.html"><i class="fas fa-arrow-left"></i> Back to Calculator</a>
</div>
</body>
</html>
